name: echos
description: Premium offline local music player.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  just_audio: ^0.9.46
  audio_service: ^0.18.17
  audio_session: ^0.1.25
  on_audio_query: ^2.9.0
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  palette_generator: ^0.3.3+7
  flutter_animate: ^4.5.2
  go_router: ^15.1.2
  google_fonts: ^6.2.1
  path_provider: ^2.1.5
  permission_handler: ^12.0.0+1
  rxdart: ^0.28.0
  uuid: ^4.5.1
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
